# api-gateway/nginx.conf
upstream auth_service {
    server auth-service:3001;
}

upstream user_service {
    server user-service:3002;
}

upstream stream_service {
    server stream-service:3003;
}

upstream payment_service {
    server payment-service:3004;
}

upstream storage_service {
    server storage-service:3005;
}

upstream chat_service {
    server chat-service:3006;
}

upstream notification_service {
    server notification-service:3007;
}

upstream call_service {
    server call-service:3008;
}

upstream ai_service {
    server ai-service:3009;
}

server {
    listen 80;
    server_name api.mintza.xyz;

    # Auth routes
    location /api/auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # User routes
    location /api/users/ {
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-User-Id $http_x_user_id;
    }

    # Stream routes
    location /api/streams/ {
        proxy_pass http://stream_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Payment routes
    location /api/payments/ {
        proxy_pass http://payment_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/stripe/ {
        proxy_pass http://payment_service;
        proxy_set_header Host $host;
    }

    # Storage routes
    location /api/storage/ {
        proxy_pass http://storage_service;
        proxy_set_header Host $host;
        client_max_body_size 100M;
    }

    # Chat routes
    location /api/chats/ {
        proxy_pass http://chat_service;
        proxy_set_header Host $host;
    }

    # Notification routes
    location /api/notifications/ {
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
    }

    # Call routes
    location /api/calls/ {
        proxy_pass http://call_service;
        proxy_set_header Host $host;
    }

    # AI routes
    location /api/ai/ {
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
    }

    # WebSocket - Stream Service
    location /socket/stream {
        proxy_pass http://stream_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # WebSocket - Chat Service
    location /socket/chat {
        proxy_pass http://chat_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # WebSocket - Call Service
    location /socket/call {
        proxy_pass http://call_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
