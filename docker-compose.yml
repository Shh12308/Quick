# docker-compose.yml
version: '3.8'

services:
  # API Gateway
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - auth-service
      - user-service
      - stream-service
      - payment-service
      - storage-service
      - chat-service
      - notification-service
      - call-service
      - ai-service

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  # Auth Service
  auth-service:
    build: ./auth-service
    environment:
      - DATABASE_URL=postgres://user:pass@postgres-auth:5432/auth_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=http://user-service:3002
    depends_on:
      - postgres-auth
      - redis

  # User Service
  user-service:
    build: ./user-service
    environment:
      - DATABASE_URL=postgres://user:pass@postgres-user:5432/user_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres-user
      - redis

  # Stream Service
  stream-service:
    build: ./stream-service
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgres://user:pass@postgres-stream:5432/stream_db
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    depends_on:
      - postgres-stream
      - redis

  # Payment Service
  payment-service:
    build: ./payment-service
    environment:
      - DATABASE_URL=postgres://user:pass@postgres-payment:5432/payment_db
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - USER_SERVICE_URL=http://user-service:3002
      - STREAM_SERVICE_URL=http://stream-service:3003
    depends_on:
      - postgres-payment

  # Storage Service
  storage-service:
    build: ./storage-service
    environment:
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_CLOUDFRONT_DOMAIN=${AWS_CLOUDFRONT_DOMAIN}

  # Chat Service
  chat-service:
    build: ./chat-service
    ports:
      - "3006:3006"
    environment:
      - DATABASE_URL=postgres://user:pass@postgres-chat:5432/chat_db
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
    depends_on:
      - postgres-chat
      - redis

  # Notification Service
  notification-service:
    build: ./notification-service
    environment:
      - DATABASE_URL=postgres://user:pass@postgres-notification:5432/notification_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ONESIGNAL_APP_ID=${ONESIGNAL_APP_ID}
      - ONESIGNAL_API_KEY=${ONESIGNAL_API_KEY}
    depends_on:
      - postgres-notification
      - rabbitmq

  # Call Service
  call-service:
    build: ./call-service
    ports:
      - "3008:3008"
    environment:
      - DATABASE_URL=postgres://user:pass@postgres-call:5432/call_db
      - AGORA_APP_ID=${AGORA_APP_ID}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - postgres-call

  # AI Service
  ai-service:
    build: ./ai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEP_AI_KEY=${DEEP_AI_KEY}

  # Databases (one per service for isolation)
  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: auth_db
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  postgres-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: user_db
    volumes:
      - postgres-user-data:/var/lib/postgresql/data

  postgres-stream:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: stream_db
    volumes:
      - postgres-stream-data:/var/lib/postgresql/data

  postgres-payment:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: payment_db
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data

  postgres-chat:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: chat_db
    volumes:
      - postgres-chat-data:/var/lib/postgresql/data

  postgres-notification:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: notification_db
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data

  postgres-call:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: call_db
    volumes:
      - postgres-call-data:/var/lib/postgresql/data

volumes:
  redis-data:
  rabbitmq-data:
  postgres-auth-data:
  postgres-user-data:
  postgres-stream-data:
  postgres-payment-data:
  postgres-chat-data:
  postgres-notification-data:
  postgres-call-data:
